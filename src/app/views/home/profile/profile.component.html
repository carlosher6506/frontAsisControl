<div>
  <div class="mb-4">
    <h4 class="fw-bold mb-1">Mi perfil</h4>
  </div>

  @if (isLoading) {
    <div class="d-flex justify-content-center py-5">
      <div class="spinner-border text-dark"></div>
    </div>
  } @else {
    <div class="row g-4">

       <!-- Avatar y datos básicos -->
      <div class="col-12 col-lg-3">
        <div class="card border-0 shadow-sm text-center p-4">
          <div class="rounded-circle bg-dark text-white d-flex align-items-center
                      justify-content-center mx-auto mb-3"
            style="width:80px;height:80px;font-size:2rem;font-weight:700;">
            {{ usuario?.nombre?.charAt(0)?.toUpperCase() }}
          </div>
          <h6 class="fw-bold mb-0">{{ usuario?.nombre }}</h6>
          <p class="text-muted small mb-1">{{ usuario?.rol }}</p>
          <p class="text-muted small mb-0">{{ perfil?.email }}</p>
          @if (perfil?.especialidad) {
            <span class="badge bg-dark mt-2">{{ perfil?.especialidad }}</span>
          }
        </div>
      </div>

      <!-- Formulario -->
      <div class="col-12 col-lg-9">
        <div class="card border-0 shadow-sm">

          <div class="card-header bg-white border-0 pt-3 pb-0">
            <h6 class="fw-bold mb-0">Información profesional</h6>
          </div>
          <div class="card-body">
            <form [formGroup]="form" novalidate>
              <div class="row g-3">

                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold small">Nombre</label>
                  <input type="text" class="form-control"
                    formControlName="nombre"/>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold small">Apellidos</label>
                  <input type="text" class="form-control"
                    formControlName="apellido"/>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold small">Teléfono</label>
                  <input type="tel" class="form-control"
                    formControlName="telefono"/>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold small">Especialidad</label>
                  <input type="text" class="form-control"
                    formControlName="especialidad"/>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold small">Carrera</label>
                  <input type="text" class="form-control"
                    formControlName="carrera"/>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label fw-semibold small">Código Classroom</label>
                  <input type="text" class="form-control"
                    formControlName="codigo_classroom"/>
                </div>

                <div class="col-12">
                  <label class="form-label fw-semibold small">Dirección</label>
                  <textarea class="form-control" rows="2"
                    formControlName="direccion">
                    </textarea>
                </div>

              </div>
            </form>
          </div>
          <div class="card-footer bg-white border-0 pt-0 pb-3 px-4 justify-content-center">
            <button class="btn btn-dark px-4 align-items-center" (click)="guardar()" [disabled]="isSubmitting">
              @if (isSubmitting) { <span class="spinner-border spinner-border-sm me-2"></span> }
              <i class="bi bi-save me-2"></i>Guardar perfil
            </button>
          </div>
        </div>
      </div>
    </div>
  }
</div>
