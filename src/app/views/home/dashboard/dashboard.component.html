<div class="dashboard-wrapper" [class.sidebar-collapsed]="!sidebarOpen">

  <!-- SIDEBAR -->
  <aside class="sidebar d-flex flex-column">
    <!-- Logo -->
    <div class="sidebar-brand d-flex align-items-center gap-2 px-3 py-3">
      <img src="/images/Logo_5.png" alt="Logo" class="sidebar-logo" />
      <span class="brand-name fw-bold text-white">AsisControl</span>
    </div>
    <div class="sidebar-divider mx-3"></div>

    <!-- Menú -->
    <nav class="flex-grow-1 py-2">
      @for (item of menuFiltrado; track item.label) {
        @if (!item.children) {
          <a
            [routerLink]="item.route"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
            class="nav-item d-flex align-items-center gap-3 px-3 py-2 text-decoration-none"
            [title]="item.label">
            <i class="bi bi-{{ item.icon }} nav-icon"></i>
            <span class="nav-label">{{ item.label }}</span>
          </a>
        } @else {
          <div
            class="nav-item nav-parent d-flex align-items-center justify-content-between px-3 py-2"
            [title]="item.label"
            (click)="toggleMenu(item)">
            <div class="d-flex align-items-center gap-3">
              <i class="bi bi-{{ item.icon }} nav-icon"></i>
              <span class="nav-label">{{ item.label }}</span>
            </div>
            <i
              class="bi bi-chevron-right submenu-arrow"
              [class.rotate]="item.open">
            </i>
          </div>
          <div
            class="submenu-wrapper"
            [class.open]="item.open">
            @for (child of item.children; track child.route) {
              <a
                [routerLink]="child.route"
                routerLinkActive="active"
                class="submenu-item d-flex align-items-center gap-3 px-3 py-2 text-decoration-none">
                <i class="bi bi-{{ child.icon }}"></i>
                <span>{{ child.label }}</span>
              </a>
            }
          </div>
        }
      }
    </nav>
    <div class="sidebar-divider mx-3"></div>
  </aside>

  <!-- CONTENIDO -->
  <div class="main-content d-flex flex-column">

    <!-- NAVBAR -->
    <nav class="top-navbar d-flex align-items-center justify-content-between px-4">

      <!-- Toggle sidebar -->
      <button class="sidebar-toggle-btn" (click)="toggleSidebar()" aria-label="Fijar/ocultar menú">
        <i class="bi bi-list fs-4"></i>
      </button>

      <!-- Derecha -->
      <div class="d-flex align-items-center gap-3">
        <div class="text-end d-none d-md-block">
          <p class="mb-0 fw-semibold small text-dark">{{ usuario?.nombre }}</p>
          <p class="mb-0 small text-info">{{ usuario?.rol }}</p>
        </div>

        <!-- Avatar + dropdown -->
        <div class="dropdown">
          <button
            class="user-avatar-nav border-0 d-flex align-items-center justify-content-center"
            type="button"
            data-bs-toggle="dropdown"
            aria-expanded="false">
            {{ usuario?.nombre?.charAt(0)?.toUpperCase() }}
          </button>

          <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 mt-2">
            <li class="px-3 py-2">
              <p class="fw-semibold mb-0 small text-dark">{{ usuario?.nombre }}</p>
              <p class="mb-0 small text-muted">{{ usuario?.rol }}</p>
            </li>
            <li><hr class="dropdown-divider my-1"></li>
            <li>
              <button class="dropdown-item text-danger small py-2" (click)="logout()">
                <i class="bi bi-box-arrow-right me-2"></i>
                Cerrar sesión
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Página activa -->
    <main class="page-content flex-grow-1 p-4">
      <router-outlet />
    </main>
  </div>
</div>
