<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light px-3">
      <div class="card border-0 shadow-sm" style="max-width:440px;width:100%">

        <div class="card-body p-5 text-center">

          @if (estado === 'cargando') {
            <div class="spinner-border text-dark mb-3"></div>
            <p class="text-muted">Verificando tu correo...</p>
          }

          @if (estado === 'exitoso') {
            <div class="rounded-circle bg-success d-flex align-items-center
                        justify-content-center mx-auto mb-4"
              style="width:64px;height:64px">
              <i class="bi bi-check-lg text-white fs-3"></i>
            </div>
            <h5 class="fw-bold mb-2">¡Correo verificado!</h5>
            <p class="text-muted small mb-4">
              Tu cuenta ha sido verificada correctamente. Ya puedes iniciar sesión.
            </p>
            <a routerLink="/login" class="btn btn-dark w-100">
              Ir al inicio de sesión
            </a>
          }

          @if (estado === 'error') {
            <div class="rounded-circle bg-danger d-flex align-items-center
                        justify-content-center mx-auto mb-4"
              style="width:64px;height:64px">
              <i class="bi bi-x-lg text-white fs-3"></i>
            </div>
            <h5 class="fw-bold mb-2">Enlace inválido o expirado</h5>
            <p class="text-muted small mb-4">{{ mensajeError }}</p>

            <!-- Reenviar verificación -->
            <div class="mb-3">
              <input type="email" class="form-control mb-2"
                [(ngModel)]="emailReenvio"
                placeholder="Tu correo electrónico" />
              <button class="btn btn-outline-dark w-100"
                [disabled]="enviando"
                (click)="reenviarVerificacion()">
                @if (enviando) {
                  <span class="spinner-border spinner-border-sm me-2"></span>
                }
                Reenviar correo de verificación
              </button>
            </div>

            <a routerLink="/login" class="small text-muted">Volver al login</a>
          }

        </div>
      </div>
    </div>
